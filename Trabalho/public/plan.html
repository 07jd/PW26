<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de planos</title>
    <!-- Font: https://fonts.google.com/share?selection.family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/plan.css">
</head>
<body>
    <!-- Top bar -->
    <div class="top_bar">
        <p class="website_name">GreenHerb</p>
        <div class="entries">
            <!-- Entries here -->
            <div class="entrie_box">
                <a href="/dashboard">Dashboard</a>
            </div>
            
            
            <div class="spacer"></div>
            <div class="user_info">
                <p id="username">Username</p>
                <button id="end_session">Terminar Sessão</button>
            </div>

        </div>
    </div>

    <!-- Main content -->
    <div class="content">
        <!-- controlled by js -->
        <div class="plan_form">
            <h2>Registro de plano</h2>
            <div class="form">
                
                <div class="form_inputs" id="form_inputs">
                    <!-- JS Generated -->
                </div>

                <div class="form_submit" id="form_submit">
                    <div class="form_buttons" id="form_buttons">
                        <div class="spacer_form_submit"></div>
                        <button id="form_submit_button" onclick=validateAndContinue()>Continuar</button>
                    </div>
                    <p id="feedback_text"></p>
                    
                </div>
            </div>
        </div>

        <!-- controlled by js -->
        <div class="plan_table" id="table_view">
            <h2>Planos Registrados</h2>
            <div class="plan_table_wrap">
                <table id="plan_table_content">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Erva</th>
                            <th>Tipo</th>
                            <th>Detalhes</th>
                        </tr>
                    </thead>
                    <tbody id="plans_table_body">
                        <!-- js elements -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- controlled by js -->
        <div id="plan_details" class="plan_details hidden">
            <button onclick=backToTable()>Voltar</button>
            <h3>Detalhes do Plano</h3>
            <div id="plan_details_body"></div>
        </div>
    </div>

    <script src="js/plan.js"></script>
</body>
</html>
