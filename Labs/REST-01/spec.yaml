openapi: 3.0.4
info:
  title: Lab-REST01
  version: "1.0"

servers:
  - url: https://localhost:8080/
tags:
  - name: encomendas
  - name: clientes
paths:
  /encomendas/{id}/cancel:
    post:
      tags:
        - encomendas
      operationId: cancelEncomendas
      summary: Cancelar encomenda.
      description: Cancelar encomenda via Id.
      parameters:
        - name : id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Sucesso.
        '400':
          description: ID inválido.
        '404':
          description: Encomenda não encontrada.
        '500':
          description: Server error.
  /encomendas:
    post:
      tags:
        - encomendas
      operationId: addEncomendas
      summary: Adicionar encomenda.
      description: Adicionar encomenda.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomendaPost'
      responses:
        '200':
          description: Sucesso.
        '400':
          description: Input inválido.
        '404':
          description: Cliente associado à encomenda não encontrado.
        '500':
          description: Server error.
    get:
      tags:
        - encomendas
      operationId: getAllEncomendas
      summary: Obter todas as encomendas
      description: Obter todas as Encomendas
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncomendaLista'
        '500':
          description: Server Errror.
  /encomendas/{id}:
    get:
      tags:
        - encomendas
      summary: Obter info de uma encomenda.
      description: Obter info de uma encomenda via ID.
      parameters:
        - name : id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encomenda'
        '400':
          description: ID inválido.
        '404':
          description: Encomenda não encontrada.
        '500':
          description: Server error.

    patch:
      tags:
        - encomendas
      summary: Alterar conteudo da encomenda
      description: Alterar conteudo da encomenda via Id.
      parameters:
        - name : id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomendaPatch'
      responses:
        '200':
          description: Sucesso.
        '400':
          description: Input inválido.
        '404':
          description: Encomenda não encontrada
        '409':
          description: Conteudo da encomenda nao pode ser alterada, devido ao seu estado atual.
        '500':
          description: Server error.
    put:
      tags:
        - encomendas
      summary: Atualizar dados de uma encomenda.
      description: Atualizar dados de uma encomenda via Id.
      parameters:
        - name : id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EncomendaPost'
      responses:
        '200':
          description: Sucesso.
        '400':
          description: Input inválido.
        '404':
          description: Encomenda não encontrada.
        '500':
          description: Server error.
  /clientes/{user_id}/encomendas/cancel-all:
    post:
      tags:
        - clientes
      operationId: cancelAllClienteEncomendas
      summary: Cancelar todas as encomendas de um Cliente.
      description: Cancelar todas as encomendas de um Cliente via Id.
      parameters:
        - name : user_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Sucesso.
        '400':
          description: ID inválido.
        '404':
          description: Cliente não encontrado.
        '500':
          description: Server error.
  /clientes:
    post:
      tags:
        - clientes
      summary: Registrar novo cliente.
      description: Registrar novo cliente.
      operationId: addCliente
      requestBody:
        description: Registrar novo cliente.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientePost"
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        '400':
          description: Invalid input.
        '409':
          description: Algum dos parametros fornecidos está em conflito.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error.
    get:
      tags:
        - clientes
      summary: Obter lista de clientes.
      description: Obter lista de clientes.
      operationId: getAllClientes
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClienteLista'
        '500':
          description: Server error.
  /clientes/{user_id}/encomendas:
    get:
      tags:
        - clientes
      operationId: getClienteEncomendas
      summary: Obter encomendas de um Cliente.
      description: Obter encomendas de um Cliente.
      parameters:
        - name : user_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncomendaLista'
        '400':
          description: Input inválido.
        '404':
          description: Cliente não encontrado.
        '500':
          description: Server error.
  /clientes/{user_id}:
    get:
      tags:
        - clientes
      summary: Obter dados de um cliente.
      description: Obter dados de um cliente via Id.
      operationId: getInfoCliente
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
           type: string
           minLength: 1
      responses:
        '200':
          description: Sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        '400':
          description: Input inválido.
        '404':
          description: Cliente não encontrado.
        '500':
          description: Server error.
    put:
      tags:
        - clientes
      summary: Atualizar um Cliente já existente.
      description: Atualizar dados do Cliente via Id.
      operationId: updateCliente
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
           type: string
           minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientePost"
      responses:
        '200':
          description: Sucesso.
        '400':
          description: Input inválido.
        '409':
          description: Duplicated parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error.
    delete:
      tags:
        - clientes
      summary: Deletar um Cliente.
      description: Deletar um Cliente ID.
      operationId: deleteCliente
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
           type: string
           minLength: 1
      responses:
        '200':
          description: Sucesso.
        '400':
          description: Input inválido.
        '494':
          description: Cliente não encontrado.
        '500':
          description: Server error.

components:
  schemas:
    Produto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
        name:
          type: string
          format: string
          example: "1kg Arroz"
        price:
          type: number
          format: float
          minimum: 0
    Encomenda:
      type: object
      required:
        - id
        - clienteID
        - content
        - data_envio
        - estado
        - completa
      properties:
        id:
          type: string
          minLength: 1
        clienteID:
          type: string
          minLength: 1
        content:
          type: array
          items:
            type: object
            properties:
              qnt:
                type: integer
                format: int32
                minimum: 1
              item:
                $ref: "#/components/schemas/Produto"
            required:
            - qnt
            - item
          example:
            [
              {
                qnt: 2,
                item:
                {
                  id: 9271,
                  name:"1k Arroz",
                  price: 3.99
                }
              }
            ]

        data_envio:
          type: string
          format: date-time
        estado:
          type: string
          description: Estado da Encomenda
          example: aprovada
          enum:
            - pendente
            - aprovada
            - entregue
        completa:
          type: boolean
    EncomendaPost:
      type: object
      required:
        - clienteID
        - content
      properties:
        clienteID:
          type: string
          minLength: 1
        content:
          type: array
          items:
            type: object
            properties:
              qnt:
                type: integer
                format: int32
                minimum: 1
              item:
                $ref: '#/components/schemas/Produto'
            required:
            - qnt
            - item
    EncomendaPatch:
      type: object
      required:
        - content
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              qnt:
                type: integer
                format: int32
                minimum: 1
              item:
                $ref: '#/components/schemas/Produto'
            required:
            - qnt
            - item
    EncomendaLista:
      type: array
      items:
        $ref: '#/components/schemas/Encomenda'
    Cliente:
      type: object
      required:
        - id
        - username
        - primeiroNome
        - ultimoNome
        - email
        - palavra_passe
        - telefone
      properties:
        id:
          type: string
          minLength: 1
        username:
          type: string
        primeiroNome:
          type: string
        ultimoNome:
          type: string
        email:
          type: string
        palavra_passe:
          type: string
        telefone:
          type: string
    ClientePost:
      type: object
      required:
      - username
      - primeiroNome
      - ultimoNome
      - email
      - palavra_passe
      - telefone
      properties:
        username:
          type: string
        primeiroNome:
          type: string
        ultimoNome:
          type: string
        email:
          type: string
          format: email
        palavra_passe:
          type: string
        telefone:
          type: string
    ClienteLista:
      type: array
      items:
        $ref: '#/components/schemas/Cliente'
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
